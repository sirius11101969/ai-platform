services:
  backend:
    build: ./backend
    restart: always
    environment:
      DATABASE_URL: postgres://postgres:password@db:5432/aibot
      BITRIX_WEBHOOK: ${BITRIX_WEBHOOK}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      TELEGRAM_MANAGER_CHAT_ID: ${TELEGRAM_MANAGER_CHAT_ID:-}
      TELEGRAM_CRM_USER_EMAIL: ${TELEGRAM_CRM_USER_EMAIL:-}
      APP_BASE_URL: ${APP_BASE_URL:-https://www.as6.ru}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-https://www.as6.ru}
      EMAIL_FROM: ${EMAIL_FROM:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      GMAIL_ACCESS_TOKEN: ${GMAIL_ACCESS_TOKEN:-}
      GMAIL_FROM: ${GMAIL_FROM:-}
      FILE_STORAGE_DIR: /app/storage/attachments
    volumes:
      - attachment_storage:/app/storage
    depends_on:
      - db

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: aibot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  nginx:
    build: ./frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  attachment_storage:
