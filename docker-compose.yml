services:
  backend:
    dns:
      - 1.1.1.1
      - 8.8.8.8
    build: ./backend
    restart: always
    environment:
      AI_EXECUTION_ADMIN_KEY: ${AI_EXECUTION_ADMIN_KEY:?AI_EXECUTION_ADMIN_KEY must be set in server .env}
      PAYMENT_WEBHOOK_SECRET: ${PAYMENT_WEBHOOK_SECRET:-}
      APP_URL: ${APP_URL:-https://www.as6.ru}
      PAYMENT_MODE: ${PAYMENT_MODE:-disabled}
      YOOKASSA_MODE: ${YOOKASSA_MODE:-disabled}
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID:-}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY:-}
      STRIPE_MODE: ${STRIPE_MODE:-disabled}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      DATABASE_URL: postgres://postgres:password@db:5432/aibot
      BITRIX_WEBHOOK: ${BITRIX_WEBHOOK}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      TELEGRAM_MANAGER_CHAT_ID: ${TELEGRAM_MANAGER_CHAT_ID:-}
      TELEGRAM_CRM_USER_EMAIL: ${TELEGRAM_CRM_USER_EMAIL:-}
      APP_BASE_URL: ${APP_BASE_URL:-https://www.as6.ru}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-https://www.as6.ru}
      PUBLIC_LEADS_WORKSPACE_ID: ${PUBLIC_LEADS_WORKSPACE_ID:-}
      PUBLIC_LEADS_RATE_LIMIT_MAX: ${PUBLIC_LEADS_RATE_LIMIT_MAX:-10}
      PUBLIC_LEADS_RATE_LIMIT_WINDOW_MS: ${PUBLIC_LEADS_RATE_LIMIT_WINDOW_MS:-900000}
      EMAIL_FROM: ${EMAIL_FROM:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      GMAIL_ACCESS_TOKEN: ${GMAIL_ACCESS_TOKEN:-}
      GMAIL_FROM: ${GMAIL_FROM:-}
      FILE_STORAGE_DIR: /app/storage/attachments
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      AI_EXECUTION_POLL_INTERVAL_MS: ${AI_EXECUTION_POLL_INTERVAL_MS:-2000}
      AI_EXECUTION_MAX_PARALLEL: ${AI_EXECUTION_MAX_PARALLEL:-4}
      AI_EXECUTION_ENABLE_BACKGROUND_LOOP: ${AI_EXECUTION_ENABLE_BACKGROUND_LOOP:-true}
    volumes:
      - attachment_storage:/app/storage
    depends_on:
      - db
      - redis

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: aibot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    expose:
      - "6379"
    volumes:
      - redis_data:/data

  nginx:
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    build: ./frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  attachment_storage:
  redis_data:
