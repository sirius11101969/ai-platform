version: '3.9'

services:
  frontend:
    build: ./frontend
    restart: always

  backend:
    build: ./backend
    restart: always
    environment:
      DATABASE_URL: postgres://postgres:password@db:5432/aibot
      BITRIX_WEBHOOK: ${BITRIX_WEBHOOK}
    depends_on:
      - db

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_DB: aibot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data

  nginx:
  build: ./frontend
  ports:
    - "80:80"
  volumes:
    - ./nginx.conf:/etc/nginx/nginx.conf
  depends_on:
    - backend

volumes:
  postgres_data:
