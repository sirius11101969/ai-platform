events {
  worker_connections 4096;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  resolver 127.0.0.11 ipv6=off valid=10s;

  map $http_authorization $as6_staging_api_basic_realm {
    default "AS6 protected staging";
    ~*^Bearer[[:space:]]+ off;
  }

  server {
    listen 80;
    server_name as6.ru;

    location ^~ /.well-known/acme-challenge/ {
      root /var/www/certbot;
      default_type text/plain;
    }

    location / {
      return 301 https://www.as6.ru$request_uri;
    }
  }

  server {
    listen 443 ssl;
    server_name as6.ru;

    ssl_certificate /etc/letsencrypt/live/as6.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/as6.ru/privkey.pem;

    return 301 https://www.as6.ru$request_uri;
  }

  server {
    listen 80;
    server_name www.as6.ru;

    location ^~ /.well-known/acme-challenge/ {
      root /var/www/certbot;
      default_type text/plain;
    }

    location / {
      return 301 https://www.as6.ru$request_uri;
    }
  }

  server {
    listen 80;
    server_name staging.as6.ru;

    location ^~ /.well-known/acme-challenge/ {
      auth_basic off;
      root /var/www/certbot;
      default_type text/plain;
    }

    location / {
      return 301 https://staging.as6.ru$request_uri;
    }
  }

  server {
    listen 443 ssl;
    server_name www.as6.ru;

    ssl_certificate /etc/letsencrypt/live/as6.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/as6.ru/privkey.pem;

    location = /api/health {
      proxy_pass http://backend:3001/health;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/ {
      proxy_pass http://backend:3001/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
      root /usr/share/nginx/html;
      index index.html;
      try_files $uri /index.html;
    }
  }

  server {
    listen 443 ssl;
    server_name staging.as6.ru;

    ssl_certificate /etc/letsencrypt/live/as6.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/as6.ru/privkey.pem;

    add_header X-AS6-Environment "staging" always;
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;

    location ^~ /.well-known/acme-challenge/ {
      auth_basic off;
      root /var/www/certbot;
      default_type text/plain;
    }

    location = /robots.txt {
      auth_basic off;
      default_type text/plain;
      return 200 "User-agent: *\nDisallow: /\n";
    }

    location /api/ {
      auth_basic $as6_staging_api_basic_realm;
      auth_basic_user_file /etc/nginx/as6/staging.htpasswd;

      set $as6_staging_upstream http://as6-staging-edge:80;
      proxy_pass $as6_staging_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-AS6-Environment staging;
      proxy_read_timeout 120s;
      proxy_send_timeout 120s;
    }

    location / {
      auth_basic "AS6 protected staging";
      auth_basic_user_file /etc/nginx/as6/staging.htpasswd;

      set $as6_staging_upstream http://as6-staging-edge:80;
      proxy_pass $as6_staging_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header X-AS6-Environment staging;
      proxy_read_timeout 120s;
      proxy_send_timeout 120s;
    }
  }
}
