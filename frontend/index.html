<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI‑платформа продаж</title>
  <style id="as6-command-center-early-no-strip-guard">
    html, body, #root { background: #030814; overflow-x: hidden; }
    body::before, body::after, #root::before, #root::after { display: none !important; content: none !important; }
    [class*="stat"]::before, [class*="stat"]::after,
    [class*="Stat"]::before, [class*="Stat"]::after,
    [class*="metric"]::before, [class*="metric"]::after,
    [class*="Metric"]::before, [class*="Metric"]::after {
      display: none !important;
      content: none !important;
      height: 0 !important;
      background: none !important;
      border: 0 !important;
      box-shadow: none !important;
    }
  </style>
  <style id="as6-command-center-first-paint-neutralizer">
    html, body, #root { background: #030814 !important; overflow-x: hidden !important; }
    body:has(.command-center-page),
    body:has(.command-center-page) #root,
    body:has(.command-center-page) .app-shell,
    body:has(.command-center-page) .workspace,
    body:has(.command-center-page) .command-center-page {
      background: #030814 !important;
      background-image: none !important;
      box-shadow: none !important;
      border-top: 0 !important;
      border-bottom: 0 !important;
    }
    body:has(.command-center-page) *::before,
    body:has(.command-center-page) *::after {
      background: none !important;
      background-image: none !important;
      box-shadow: none !important;
      border-top: 0 !important;
      border-bottom: 0 !important;
    }
  </style>
  <style id="as6-command-center-strong-bootlock-v191">
    html.as6-command-center-bootlock, html.as6-command-center-bootlock body {
      margin: 0 !important;
      background: #030814 !important;
      overflow: hidden !important;
    }
    html.as6-command-center-bootlock body > *,
    html.as6-command-center-bootlock #root,
    html.as6-command-center-bootlock [id^="as6-"] {
      visibility: hidden !important;
      opacity: 0 !important;
      pointer-events: none !important;
    }
    html.as6-command-center-bootlock::before,
    html.as6-command-center-bootlock::after,
    html.as6-command-center-bootlock body::before,
    html.as6-command-center-bootlock body::after {
      display: none !important;
      content: none !important;
      background: none !important;
      border: 0 !important;
      box-shadow: none !important;
    }
  </style>
  <script id="as6-command-center-strong-bootlock-v191">
    if (location.pathname === "/command-center") { document.documentElement.classList.add("as6-command-center-bootlock"); }
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
