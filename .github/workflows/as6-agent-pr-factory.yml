name: AS6 Agent PR Factory

on:
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Source issue number"
        required: true
        type: string
      agent:
        description: "Agent: backend, frontend, or devops"
        required: true
        type: choice
        options: [backend, frontend, devops]
      task:
        description: "Agent task body"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  create-agent-pr:
    name: Create AS6 agent branch and draft PR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create branch, task file, and draft PR
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const eventInputs = (context.payload && context.payload.inputs) || {};

            const issueNumber = String(eventInputs.issue_number || core.getInput("issue_number") || "").trim();
            const agent = String(eventInputs.agent || core.getInput("agent") || "").trim();
            const task = String(eventInputs.task || core.getInput("task") || "").trim();

            console.log(`AS6_PR_FACTORY_INPUT_SOURCE=${Object.keys(eventInputs).length ? "event.inputs" : "core.getInput"}`);

            if (!issueNumber || !agent || !task) {
              console.log("AS6_PR_FACTORY_INPUT_RESULT=FAIL");
              console.log(`AS6_PR_FACTORY_INPUT_ISSUE_PRESENT=${issueNumber ? "YES" : "NO"}`);
              console.log(`AS6_PR_FACTORY_INPUT_AGENT_PRESENT=${agent ? "YES" : "NO"}`);
              console.log(`AS6_PR_FACTORY_INPUT_TASK_PRESENT=${task ? "YES" : "NO"}`);
              throw new Error("AS6 PR Factory missing required inputs; refusing to create branch, task file, PR, or issue comment.");
            }

            if (!["backend", "frontend", "devops"].includes(agent)) {
              console.log("AS6_PR_FACTORY_INPUT_RESULT=FAIL");
              throw new Error(`AS6 PR Factory invalid agent: ${agent}`);
            }

            if (!/^\d+$/.test(issueNumber) || Number(issueNumber) <= 0) {
              console.log("AS6_PR_FACTORY_INPUT_RESULT=FAIL");
              throw new Error(`AS6 PR Factory invalid issue_number: ${issueNumber}`);
            }

            console.log("AS6_PR_FACTORY_INPUT_RESULT=OK");

            const base = "main";
            const branch = `as6-agent/${agent}-issue-${issueNumber}`;

            console.log(`AS6_PR_FACTORY_AGENT=${agent}`);
            console.log(`AS6_PR_FACTORY_ISSUE=${issueNumber}`);
            console.log(`AS6_PR_FACTORY_BRANCH=${branch}`);

            const baseRef = await github.rest.git.getRef({
              owner,
              repo,
              ref: `heads/${base}`
            });

            try {
              await github.rest.git.createRef({
                owner,
                repo,
                ref: `refs/heads/${branch}`,
                sha: baseRef.data.object.sha
              });
              console.log("AS6_PR_FACTORY_BRANCH_RESULT=CREATED");
            } catch (error) {
              if (error.status === 422) {
                console.log("AS6_PR_FACTORY_BRANCH_RESULT=EXISTS");
              } else {
                throw error;
              }
            }

            const path = `.github/agent-tasks/issue-${issueNumber}-${agent}.md`;
            const content = [
              `# AS6 Agent Task`,
              ``,
              `Source issue: #${issueNumber}`,
              `Agent: ${agent}`,
              ``,
              `## Task`,
              ``,
              task,
              ``,
              `## AS6 Rules`,
              ``,
              `- PR only`,
              `- No production mutation without diagnostics`,
              `- No secret exposure`,
              `- Diagnostics-first workflow`,
              `- Add recurring checks to diagnostics`
            ].join("\n");

            let existingSha = null;
            try {
              const existing = await github.rest.repos.getContent({
                owner,
                repo,
                path,
                ref: branch
              });
              existingSha = existing.data.sha;
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path,
              message: `chore: add AS6 ${agent} agent task for issue #${issueNumber}`,
              content: Buffer.from(content).toString("base64"),
              branch,
              sha: existingSha || undefined
            });

            console.log("AS6_PR_FACTORY_TASK_FILE=OK");

            const prs = await github.rest.pulls.list({
              owner,
              repo,
              head: `${owner}:${branch}`,
              state: "open"
            });

            let pr;
            if (prs.data.length > 0) {
              pr = prs.data[0];
              console.log(`AS6_PR_FACTORY_PR_RESULT=EXISTS`);
            } else {
              const created = await github.rest.pulls.create({
                owner,
                repo,
                title: `AS6 ${agent} agent task for issue #${issueNumber}`,
                head: branch,
                base,
                draft: true,
                body: [
                  `## AS6 Agent Task`,
                  ``,
                  `Source issue: #${issueNumber}`,
                  `Agent: ${agent}`,
                  ``,
                  `This is a safe PR factory bootstrap PR.`,
                  ``,
                  `Next expected step: Codex agent or human operator implements the task in this branch, then marks PR ready only after diagnostics pass.`,
                  ``,
                  `## Safety`,
                  ``,
                  `- No production mutation in this bootstrap PR`,
                  `- No secrets committed`,
                  `- PR-only workflow`,
                  `- Guardian and Codex Review must pass before merge`
                ].join("\n")
              });
              pr = created.data;
              console.log(`AS6_PR_FACTORY_PR_RESULT=CREATED`);
            }

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: Number(issueNumber),
              body: [
                `AS6 Agent PR Factory created/updated draft PR for **${agent}**.`,
                ``,
                `Branch: \`${branch}\``,
                `PR: #${pr.number}`,
                ``,
                `Next step: implement task in the PR branch, then run diagnostics and mark ready only after checks pass.`
              ].join("\n")
            });

            console.log(`AS6_PR_FACTORY_PR_NUMBER=${pr.number}`);
            console.log("AS6_PR_FACTORY_RESULT=OK");
