name: AS6 Constitution Gate

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  constitution-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash ops/bin/as6-diagnose-constitution
      - run: bash ops/bin/as6-diagnose-heredoc-safety
      - run: bash ops/bin/as6-diagnose-diagnostic-flow
      - run: bash ops/bin/as6-diagnose-diagnostic-coverage
      - run: bash ops/bin/as6-diagnose-diagnostic-status-registry
