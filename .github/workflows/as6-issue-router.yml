name: AS6 AI Workforce Issue Router

on:
  issues:
    types: [opened, edited, labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to route manually"
        required: true
        type: string
      agent:
        description: "Agent override"
        required: false
        type: choice
        options: [auto, backend, frontend, devops]
        default: auto

permissions:
  issues: write
  contents: read

jobs:
  route-issue:
    name: Route issue to AS6 agent
    runs-on: ubuntu-latest
    env:
      AS6_WORKFORCE_DISPATCH_TOKEN: ${{ secrets[format('{0}_{1}_{2}', 'AS6_WORKFORCE', 'DISPATCH', 'TOKEN')] || '' }}

    steps:
      - name: Route issue
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            let issueNumber, title = "", body = "", labels = [];

            if (context.eventName === "workflow_dispatch") {
              issueNumber = Number(core.getInput("issue_number"));
              const issue = await github.rest.issues.get({ owner, repo, issue_number: issueNumber });
              title = issue.data.title || "";
              body = issue.data.body || "";
              labels = (issue.data.labels || []).map((label) => typeof label === "string" ? label : label.name);
            } else {
              issueNumber = context.payload.issue.number;
              title = context.payload.issue.title || "";
              body = context.payload.issue.body || "";
              labels = (context.payload.issue.labels || []).map((label) => label.name);
            }

            const manualAgent = context.eventName === "workflow_dispatch" ? core.getInput("agent") : "auto";
            const text = `${title}\n${body}\n${labels.join(" ")}`.toLowerCase();

            let agent = manualAgent && manualAgent !== "auto" ? manualAgent : null;

            if (!agent) {
              if (text.includes("[backend]") || text.includes("backend") || text.includes("api") || text.includes("postgres") || text.includes("redis")) agent = "backend";
              else if (text.includes("[frontend]") || text.includes("frontend") || text.includes("ui") || text.includes("react") || text.includes("command center") || text.includes("landing")) agent = "frontend";
              else if (text.includes("[devops]") || text.includes("devops") || text.includes("diagnostic") || text.includes("docker") || text.includes("nginx") || text.includes("security")) agent = "devops";
            }

            if (!agent) {
              await github.rest.issues.createComment({
                owner, repo, issue_number: issueNumber,
                body: "AS6 AI Workforce Router: no agent selected. Use `[backend]`, `[frontend]`, or `[devops]`."
              });
              return;
            }

            const labelByAgent = {
              backend: "as6-agent:backend",
              frontend: "as6-agent:frontend",
              devops: "as6-agent:devops",
            };

            const workflowByAgent = {
              backend: "as6-backend-agent.yml",
              frontend: "as6-frontend-agent.yml",
              devops: "as6-devops-agent.yml",
            };

            const workflowNameByAgent = {
              backend: "AS6 Backend Codex Agent",
              frontend: "AS6 Frontend Codex Agent",
              devops: "AS6 DevOps Codex Agent",
            };

            const label = labelByAgent[agent];
            const workflow_id = workflowByAgent[agent];
            const workflowName = workflowNameByAgent[agent];

            const task = [
              `Issue #${issueNumber}: ${title}`,
              "",
              body || "",
              "",
              "AS6 rules:",
              "- Work through PR only.",
              "- Do not mutate production.",
              "- Do not expose secrets.",
              "- Follow diagnostics-first workflow.",
              "- If a recurring issue is found, recommend or add a diagnostic."
            ].join("\n");

            await github.rest.issues.addLabels({
              owner, repo, issue_number: issueNumber,
              labels: [label, "as6-ai-workforce"]
            });

            const dispatchToken = process.env.AS6_WORKFORCE_DISPATCH_TOKEN || "";

            console.log(`AS6_ROUTER_AGENT=${agent}`);
            console.log(`AS6_ROUTER_WORKFLOW=${workflow_id}`);
            console.log(`AS6_ROUTER_ISSUE=${issueNumber}`);

            if (dispatchToken) {
              console.log("AS6_ROUTER_MODE=auto-dispatch");
              const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/actions/workflows/${workflow_id}/dispatches`, {
                method: "POST",
                headers: {
                  "Authorization": `Bearer ${dispatchToken}`,
                  "Accept": "application/vnd.github+json",
                  "X-GitHub-Api-Version": "2022-11-28"
                },
                body: JSON.stringify({
                  ref: "main",
                  inputs: { task }
                })
              });

              if (!response.ok) {
                const details = await response.text();
                throw new Error(`AS6 agent dispatch failed: ${response.status} ${details}`);
              }

              console.log("AS6_ROUTER_DISPATCH_RESULT=OK");

              await github.rest.issues.createComment({
                owner, repo, issue_number: issueNumber,
                body: `AS6 AI Workforce Router automatically dispatched **${agent}** via **${workflowName}**.`
              });
              return;
            }

            console.log("AS6_ROUTER_MODE=safe-handoff");

            await github.rest.issues.createComment({
              owner, repo, issue_number: issueNumber,
              body: [
                `AS6 AI Workforce Router selected the **${agent}** Codex agent for this issue.`,
                "",
                `Label added: \`${label}\``,
                "",
                "Safe handoff mode is active because `AS6_WORKFORCE_DISPATCH_TOKEN` is not configured.",
                "",
                "Next step:",
                `Open GitHub → Actions → ${workflowName} → Run workflow`,
                "",
                "Use this task:",
                "",
                "```",
                task,
                "```"
              ].join("\n")
            });
