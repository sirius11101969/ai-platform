name: AS6 Agent Branch Writer

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Target branch. Must start with as6-agent/"
        required: true
        type: string
      task_file:
        description: "Task file path. Must start with .github/agent-tasks/"
        required: true
        type: string
      note:
        description: "Safe note to append to the task branch"
        required: false
        type: string
        default: "AS6 controlled branch writer heartbeat."

permissions:
  contents: write
  pull-requests: read

jobs:
  write-agent-branch:
    name: Write only to AS6 agent branch
    runs-on: ubuntu-latest

    steps:
      - name: Validate inputs
        id: validate
        uses: actions/github-script@v7
        with:
          script: |
            const branch = core.getInput("branch").trim();
            const taskFile = core.getInput("task_file").trim();

            console.log(`AS6_BRANCH_WRITER_BRANCH=${branch}`);
            console.log(`AS6_BRANCH_WRITER_TASK_FILE=${taskFile}`);

            if (!branch.startsWith("as6-agent/")) {
              throw new Error("AS6 Branch Writer refuses to write outside as6-agent/* branches.");
            }

            if (branch === "main" || branch.includes("..") || branch.includes(" ")) {
              throw new Error("AS6 Branch Writer rejected unsafe branch name.");
            }

            if (!taskFile.startsWith(".github/agent-tasks/")) {
              throw new Error("AS6 Branch Writer requires task_file under .github/agent-tasks/.");
            }

            console.log("AS6_BRANCH_WRITER_INPUT_RESULT=OK");

      - name: Checkout target branch
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0

      - name: Write safe heartbeat file
        run: |
          set -euo pipefail

          branch="${{ inputs.branch }}"
          note="${{ inputs.note }}"

          case "$branch" in
            as6-agent/*) ;;
            *) echo "AS6_BRANCH_WRITER_BRANCH_GUARD=FAIL"; exit 1 ;;
          esac

          mkdir -p .github/agent-writer

          cat > .github/agent-writer/last-run.md <<EOF2
# AS6 Agent Branch Writer

Branch: ${branch}

Status: controlled branch writer executed.

Note:
${note}
EOF2

          echo "AS6_BRANCH_WRITER_FILE_RESULT=OK"

      - name: Commit safe branch writer heartbeat
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet; then
            echo "AS6_BRANCH_WRITER_COMMIT_RESULT=NO_CHANGES"
            exit 0
          fi

          git add .github/agent-writer/last-run.md
          git commit -m "chore: record AS6 agent branch writer heartbeat"
          git push origin "HEAD:${{ inputs.branch }}"

          echo "AS6_BRANCH_WRITER_COMMIT_RESULT=OK"
