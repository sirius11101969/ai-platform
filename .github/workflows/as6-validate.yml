name: AS6 Validate

on:
  pull_request:
  push:
    branches:
      - main
      - preview/pr-359

jobs:
  as6-validate:
    name: AS6 DAG Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Run AS6 DAG validation
        run: ops/bin/as6-validate
