name: AS6 DevOps Codex Agent

on:
  workflow_dispatch:
    inputs:
      task:
        description: "DevOps/Security task for AS6 Codex Agent"
        required: true
        type: string

permissions:
  contents: read

jobs:
  devops-agent:
    name: DevOps Agent
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run DevOps Codex Agent
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/as6-devops-agent.md
          sandbox: read-only
          safety-strategy: drop-sudo
          codex-args: '["--ephemeral"]'
